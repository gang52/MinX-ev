            45% { left: 44%; top: 47%; transform: rotate(-18deg) scale(1); }

function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 22.9734, lng: 78.6569 },
        zoom: 5,
        styles: DARK_STYLES,
        disableDefaultUI: false,
        zoomControl: true,
        streetViewControl: false,
        mapTypeControl: false,
        fullscreenControl: false,
    });

    directionsService  = new google.maps.DirectionsService();
    geocoder = new google.maps.Geocoder();
    directionsRenderer = new google.maps.DirectionsRenderer({
        polylineOptions: {
            strokeColor: MAP_COLORS.rose,
            strokeWeight: 5,
            strokeOpacity: 0.9,
        },
        suppressMarkers: false,
    });
    directionsRenderer.setMap(map);
    placesService = new google.maps.places.PlacesService(map);

    plotStations();
    searchIndiaChargerHubs();
    map.addListener('idle', scheduleVisibleChargerSearch);
    applyTheme(localStorage.getItem('minx_map_theme') || localStorage.getItem('minx_theme') || 'dark');
    window.addEventListener('message', handleParentMessage);
}

function handleParentMessage(event) {
    const d = event.data;
    if (!d) return;
    if (d.userLocation) setUserMarker(d.userLocation, d.originLabel, d.userCar);
    if (d.action === 'previewPlace' && d.location) previewPlace(d.location, d.label, d.kind);
    if (d.action === 'route' && d.origin && d.destination) {
        doRoute(d.origin, d.destination, d.originLabel, d.destinationLabel);
    }
    if (d.action === 'findCharger' && d.origin) findChargerFrom(d.origin, d.originLabel, d.userCar);
    if (d.theme) applyTheme(d.theme);
}

function applyTheme(theme) {
    isDark = theme === 'dark';
    map.setOptions({ styles: isDark ? DARK_STYLES : LIGHT_STYLES });
    document.body.className = isDark ? '' : 'light';
    directionsRenderer?.setOptions({
        polylineOptions: {
            strokeColor: isDark ? MAP_COLORS.rose : '#d92f68',
            strokeWeight: 5,
            strokeOpacity: 0.9,
        },
    });
}

function plotStations() {
    EV_STATIONS.forEach(station => {
        const marker = new google.maps.Marker({
            position: { lat: station.lat, lng: station.lng },
            map,
            title: station.name,
            icon: {
                path: 'M 0,-10 L -4,0 L 0,0 L -4,10 L 4,-2 L 0,-2 Z',
                fillColor: MAP_COLORS.rose,
                fillOpacity: 1,
                strokeColor: '#ffffff',
                strokeWeight: 1,
                scale: 2,
            },
        });

        new google.maps.Circle({
            center: { lat: station.lat, lng: station.lng },
            radius: 120,
            map,
            fillColor: MAP_COLORS.violet,
            fillOpacity: 0.08,
            strokeColor: MAP_COLORS.rose,
            strokeOpacity: 0.25,
            strokeWeight: 1,
            clickable: false,
        });

        marker.addListener('click', () => {
            showInfo(
                station.name,
                `<strong>Type:</strong> ${station.type}<br>
                 <strong>Power:</strong> ${station.power}<br>
                 <strong>Slots:</strong> ${station.slots} available<br>
                 <strong>Status:</strong> <span style="color:${MAP_COLORS.green}">Online ✅</span>`
            );
        });
    });

    const badge = document.getElementById('station-count');
    if (badge) badge.textContent = `⚡ ${EV_STATIONS.length} Stations · Chennai`;
}

function plotStations() {
    const seedStations = [...EV_STATIONS];
    EV_STATIONS.length = 0;
    seedStations.forEach(station => upsertStation(station, 'Seed'));
    refreshStationBadge();
}

function getStationKey(station) {
    return `${station.name.toLowerCase().replace(/\s+/g, '-')}:${station.lat.toFixed(4)},${station.lng.toFixed(4)}`;
}

function upsertStation(station, source = 'Live') {
    if (!Number.isFinite(station.lat) || !Number.isFinite(station.lng) || !station.name) return;
    const key = getStationKey(station);
    if (stationByKey.has(key)) return;

    station.source = source;
    stationByKey.set(key, station);
    EV_STATIONS.push(station);
    plotStation(station);
    refreshStationBadge();
}

function plotStation(station) {
    const marker = new google.maps.Marker({
        position: { lat: station.lat, lng: station.lng },
        map,
        title: station.name,
        icon: {
            path: 'M 0,-10 L -4,0 L 0,0 L -4,10 L 4,-2 L 0,-2 Z',
            fillColor: station.source === 'Live' ? MAP_COLORS.green : MAP_COLORS.rose,
            fillOpacity: 1,
            strokeColor: '#ffffff',
            strokeWeight: 1,
            scale: 2,
        },
    });

    const circle = new google.maps.Circle({
        center: { lat: station.lat, lng: station.lng },
        radius: station.source === 'Live' ? 90 : 120,
        map,
        fillColor: station.source === 'Live' ? MAP_COLORS.green : MAP_COLORS.violet,
        fillOpacity: 0.08,
        strokeColor: station.source === 'Live' ? MAP_COLORS.green : MAP_COLORS.rose,
        strokeOpacity: 0.25,
        strokeWeight: 1,
        clickable: false,
    });

    stationMarkers.push(marker);
    stationCircles.push(circle);
    marker.addListener('click', () => showInfo(station.name, stationInfoHtml(station)));
}

function stationInfoHtml(station) {
    const city = station.city ? `<strong>City:</strong> ${escapeMapHtml(station.city)}<br>` : '';
    const source = station.source === 'Live' ? 'Google Places live result' : 'India seed network';
    const rating = station.rating ? `<br><strong>Rating:</strong> ${escapeMapHtml(station.rating)}` : '';
    const address = station.address ? `<br><strong>Address:</strong> ${escapeMapHtml(station.address)}` : '';
    const liveStatus = station.openNow === true ? 'Open now' : station.openNow === false ? 'May be closed' : 'Mapped';
    return `${city}
        <strong>Type:</strong> ${escapeMapHtml(station.type || 'EV charging station')}<br>
        <strong>Power:</strong> ${escapeMapHtml(station.power || 'Check station')}<br>
        <strong>Slots:</strong> ${escapeMapHtml(String(station.slots || 'Check live'))}<br>
        <strong>Source:</strong> ${source}${rating}${address}<br>
        <strong>Status:</strong> <span style="color:${MAP_COLORS.green}">${liveStatus}</span>`;
}

function refreshStationBadge() {
    const badge = document.getElementById('station-count');
    if (!badge) return;
    const liveCount = EV_STATIONS.filter(station => station.source === 'Live').length;
    badge.textContent = `⚡ ${EV_STATIONS.length} India Stations${liveCount ? ` · ${liveCount} live` : ''}`;
}

function scheduleVisibleChargerSearch() {
    clearTimeout(liveSearchTimer);
    liveSearchTimer = setTimeout(() => {
        const center = map?.getCenter();
        if (center) searchNearbyChargers({ lat: center.lat(), lng: center.lng() });
    }, 650);
}

function searchIndiaChargerHubs() {
    INDIA_CHARGER_SEARCH_HUBS.forEach((hub, index) => {
        setTimeout(() => searchNearbyChargers(hub, 50000), index * 320);
    });
}

function searchNearbyChargers(location, radius = 50000) {
    if (!placesService || !location) return;

    placesService.nearbySearch(
        {
            location,
            radius,
            keyword: 'EV charging station',
            type: 'electric_vehicle_charging_station',
        },
        (results, status) => {
            if (status !== google.maps.places.PlacesServiceStatus.OK || !Array.isArray(results)) return;
            results.forEach(place => {
                const loc = place.geometry?.location;
                if (!loc) return;
                upsertStation({
                    name: place.name || 'EV Charging Station',
                    city: place.vicinity || '',
                    address: place.vicinity || '',
                    lat: loc.lat(),
                    lng: loc.lng(),
                    type: 'EV charging station',
                    power: 'Check live',
                    slots: 'Check live',
                    rating: place.rating || '',
                    openNow: place.opening_hours?.open_now,
                }, 'Live');
            });
        }
    );
}

function setUserMarker(loc, label = 'Your location', userCar = null) {
    if (userMarker) userMarker.setMap(null);
    if (userCircle) userCircle.setMap(null);

    userMarker = new google.maps.Marker({
        position: loc,
        map,
        title: label,
        zIndex: 999,
        icon: createCarMarkerIcon(),
    });

    userCircle = new google.maps.Circle({
        center: loc,
        radius: 250,
        map,
        fillColor: MAP_COLORS.cyan,
        fillOpacity: 0.08,
        strokeColor: MAP_COLORS.cyan,
        strokeOpacity: 0.28,
        strokeWeight: 1,
        clickable: false,
    });

    map.panTo(loc);
}

function createCarMarkerIcon() {
    const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="82" height="58" viewBox="0 0 82 58">
            <defs>
                <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#ff4b5f"/>
                    <stop offset="0.48" stop-color="#b90820"/>
                    <stop offset="1" stop-color="#351019"/>
                </linearGradient>
                <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                    <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#e01632" flood-opacity="0.38"/>
                </filter>
            </defs>
            <path d="M41 56 33 43h16L41 56Z" fill="#8f0718"/>
            <path d="M13 35h56c3 0 5-2 5-5v-8c0-3-2-5-5-5h-8l-8-8H30l-8 8h-9c-3 0-5 2-5 5v8c0 3 2 5 5 5Z" fill="url(#shell)" filter="url(#glow)"/>
            <path d="M27 17 33 11h16l6 6H27Z" fill="rgba(255,255,255,0.34)"/>
            <path d="M16 23h49" stroke="rgba(255,255,255,0.36)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="24" cy="36" r="7" fill="#090407" stroke="#ff4b5f" stroke-width="2"/>
            <circle cx="58" cy="36" r="7" fill="#090407" stroke="#ff4b5f" stroke-width="2"/>
            <circle cx="24" cy="36" r="3" fill="#2b1117"/>
            <circle cx="58" cy="36" r="3" fill="#2b1117"/>
        </svg>`;
    return {
        url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
        scaledSize: new google.maps.Size(68, 48),
        anchor: new google.maps.Point(34, 48),
    };
}

function normalizeRoutePoint(point) {
    if (!point) return null;
    if (typeof point === 'string') return point;
    if (Number.isFinite(point.lat) && Number.isFinite(point.lng)) {
        return new google.maps.LatLng(point.lat, point.lng);
    }
    return null;
}

function resolveLocation(point, onSuccess, onError) {
    if (!point) {
        onError?.('Missing location');
        return;
    }
    if (typeof point !== 'string') {
        onSuccess({ lat: point.lat, lng: point.lng }, '');
        return;
    }
    geocoder.geocode({ address: point }, (results, status) => {
        if (status !== 'OK' || !results?.[0]) {
            onError?.(`Could not find "${point}" (${status}).`);
            return;
        }
        const loc = results[0].geometry.location;
        onSuccess(
            { lat: loc.lat(), lng: loc.lng() },
            results[0].formatted_address || point
        );
    });
}

function doRoute(origin, destination, originLabel, destinationLabel) {
    const routeOrigin = normalizeRoutePoint(origin);
    const routeDestination = normalizeRoutePoint(destination);
    if (!routeOrigin || !routeDestination) {
        showInfo('Route Error', 'Enter a valid starting point and destination.');
        return;
    }
    if (previewMarker) previewMarker.setMap(null);

    directionsService.route(
        {
            origin: routeOrigin,
            destination: routeDestination,
            travelMode: google.maps.TravelMode.DRIVING,
        },
        (result, status) => {
            if (status !== 'OK') {
                showInfo('Route Error', `Could not calculate route (${status}). Check the destination.`);
                return;
            }

            directionsRenderer.setDirections(result);

            const leg          = result.routes[0].legs[0];
            const km           = Math.round(leg.distance.value / 1000);
            const battEstimate = Math.min(100, Math.round(km * 0.15));

            showInfo(
                `Route → ${(destinationLabel || leg.end_address).split(',')[0]}`,
                `<strong>Distance:</strong>  ${leg.distance.text}<br>
                 <strong>Duration:</strong>  ${leg.duration.text}<br>
                 <strong>Battery use:</strong> ~${battEstimate}%<br>
                 <strong>From:</strong> ${(originLabel || leg.start_address).split(',')[0]}`
            );
        }
    );
}

function findChargerFrom(origin, originLabel, userCar = null) {
    resolveLocation(
        origin,
        loc => {
            setUserMarker(loc, originLabel || 'Starting point', userCar);
            searchNearbyChargers(loc, 50000);
            setTimeout(() => highlightNearest(loc), 700);
        },
        message => showInfo('Location Error', message)
    );
}

function previewPlace(loc, label, kind = 'destination') {
    if (previewMarker) previewMarker.setMap(null);

    previewMarker = new google.maps.Marker({
        position: loc,
        map,
        title: label || 'Selected place',
        zIndex: 998,
        icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 9,
            fillColor: kind === 'origin' ? MAP_COLORS.green : MAP_COLORS.amber,
            fillOpacity: 1,
            strokeColor: '#ffffff',
            strokeWeight: 2,
        },
    });

    map.panTo(loc);
    map.setZoom(Math.max(map.getZoom(), 14));
    showInfo(
        kind === 'origin' ? 'Starting Point' : 'Destination Preview',
        `<strong>${escapeMapHtml(label || 'Selected place')}</strong><br>Ready for route planning.`
    );
}

function highlightNearest(userLoc) {
    let nearest = null;
    let minDist = Infinity;

    EV_STATIONS.forEach(station => {
        const dist = distanceKm(userLoc, station);
        if (dist < minDist) { minDist = dist; nearest = station; }
    });

    if (!nearest) return;

    map.panTo({ lat: nearest.lat, lng: nearest.lng });
    map.setZoom(15);

    showInfo(
        `Nearest: ${nearest.name}`,
        `<strong>Type:</strong>   ${nearest.type}<br>
         <strong>Power:</strong>  ${nearest.power}<br>
         <strong>Slots:</strong>  ${nearest.slots} available<br>
         <strong>Status:</strong> <span style="color:${MAP_COLORS.green}">Online ✅</span>`
    );

    const bounceMarker = new google.maps.Marker({
        position: { lat: nearest.lat, lng: nearest.lng },
        map,
        icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 22,
            fillColor: MAP_COLORS.rose,
            fillOpacity: 0.15,
            strokeColor: MAP_COLORS.rose,
            strokeWeight: 2,
        },
        animation: google.maps.Animation.BOUNCE,
    });

    setTimeout(() => bounceMarker.setMap(null), 3000);
}

function distanceKm(a, b) {
    const toRad = value => value * Math.PI / 180;
    const r = 6371;
    const dLat = toRad(b.lat - a.lat);
    const dLng = toRad(b.lng - a.lng);
    const lat1 = toRad(a.lat);
    const lat2 = toRad(b.lat);
    const h =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
    return 2 * r * Math.asin(Math.sqrt(h));
}

function escapeMapHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function showInfo(title, bodyHtml) {
    document.getElementById('info-title').textContent = title;
    document.getElementById('info-body').innerHTML    = bodyHtml;
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    panel.style.animation = 'none';
    requestAnimationFrame(() => { panel.style.animation = ''; });
}

function hideInfo() {
    document.getElementById('info-panel').style.display = 'none';
}
</script>
